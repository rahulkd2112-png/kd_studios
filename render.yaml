services:
  - type: web
    name: kd-studios-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:production
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://kdstudioslabs.netlify.app
      - key: TRUST_PROXY
        value: "true"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NAME
        value: KD Studios Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_OTP_TTL_MINUTES
        value: "10"
      - key: ADMIN_OTP_MAX_ATTEMPTS
        value: "5"
      - key: PASSWORD_RESET_OTP_TTL_MINUTES
        value: "15"
      - key: PASSWORD_RESET_OTP_MAX_ATTEMPTS
        value: "5"
      - key: REGISTRATION_OTP_MAX_ATTEMPTS
        value: "5"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: SOCKET_PATH
        value: /ws
